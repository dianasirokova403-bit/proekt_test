<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <style>
    :root {
      --bg-start: #0f172a;
      --bg-end: #1e1b4b;
      --card-bg: rgba(255, 255, 255, 0.1);
      --card-border: rgba(255, 255, 255, 0.25);
      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      --accent: #38bdf8;
      --accent-2: #818cf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-main);
      background: linear-gradient(130deg, var(--bg-start), var(--bg-end));
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      z-index: 0;
      animation: pulse 7s ease-in-out infinite;
    }

    body::before {
      width: 280px;
      height: 280px;
      top: -80px;
      left: -60px;
      background: rgba(56, 189, 248, 0.35);
    }

    body::after {
      width: 340px;
      height: 340px;
      bottom: -120px;
      right: -100px;
      background: rgba(129, 140, 248, 0.3);
      animation-delay: 1.2s;
    }

    .card {
      width: min(720px, 100%);
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 35px rgba(2, 6, 23, 0.4);
      animation: fadeUp 900ms ease both;
    }

    h1 {
      font-size: clamp(1.5rem, 2.4vw, 2.2rem);
      margin-bottom: 10px;
      letter-spacing: 0.4px;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 22px;
    }

    ul {
      list-style: none;
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    li {
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      transform: translateX(-16px);
      opacity: 0;
      animation: slideIn 650ms ease forwards;
      animation-delay: calc(180ms + (var(--i, 0) * 140ms));
      transition: transform 250ms ease, border-color 250ms ease, background 250ms ease;
    }

    li:hover {
      transform: translateX(0) scale(1.02);
      border-color: rgba(56, 189, 248, 0.75);
      background: rgba(56, 189, 248, 0.16);
    }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .generate-btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #0b1022;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      cursor: pointer;
      transition: transform 220ms ease, box-shadow 220ms ease;
      box-shadow: 0 10px 18px rgba(14, 165, 233, 0.25);
    }

    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 20px rgba(14, 165, 233, 0.3);
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    .list-refresh {
      animation: fadeList 280ms ease;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #0b1022;
      font-weight: 700;
      font-size: 0.9rem;
      animation: float 3.2s ease-in-out infinite;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes fadeList {
      from { opacity: 0.15; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Генератор идей для постов</h1>
    <p class="subtitle">Выбери формат и получи готовое вдохновение для контента.</p>
    <ul id="idea-list">
      <li style="--i: 0;">5 идей постов для экспертов</li>
      <li style="--i: 1;">3 идеи сторис на сегодня</li>
      <li style="--i: 2;">Контент-план на неделю</li>
    </ul>
    <div class="actions">
      <button class="generate-btn" id="generate-btn" type="button">Сгенерировать новые идеи</button>
      <span class="badge" id="format-badge">Формат: экспертный блог</span>
    </div>
  </main>
  <script>
    const ideaPacks = [
      {
        label: "Формат: экспертный блог",
        ideas: [
          "5 идей постов для экспертов",
          "3 идеи сторис на сегодня",
          "Контент-план на неделю"
        ]
      },
      {
        label: "Формат: продажи и прогрев",
        ideas: [
          "Пост: 3 частые ошибки клиентов до покупки",
          "Сторис: кейс до/после с результатом",
          "Пост: мини-воронка из 4 касаний"
        ]
      },
      {
        label: "Формат: личный бренд",
        ideas: [
          "Пост: история одного провала и вывод",
          "Сторис: день изнутри в 5 кадрах",
          "Пост: ваш главный принцип в работе"
        ]
      },
      {
        label: "Формат: вовлечение",
        ideas: [
          "Пост-опрос: что сложнее всего в вашей нише?",
          "Сторис: правда или миф о вашей теме",
          "Пост: разбор комментария подписчика"
        ]
      }
    ];

    const listEl = document.getElementById("idea-list");
    const buttonEl = document.getElementById("generate-btn");
    const badgeEl = document.getElementById("format-badge");

    let currentIndex = 0;

    function renderPack(pack) {
      listEl.classList.remove("list-refresh");
      void listEl.offsetWidth;
      listEl.classList.add("list-refresh");

      listEl.innerHTML = "";
      pack.ideas.forEach((idea, index) => {
        const item = document.createElement("li");
        item.style.setProperty("--i", index);
        item.textContent = idea;
        listEl.appendChild(item);
      });

      badgeEl.textContent = pack.label;
    }

    buttonEl.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % ideaPacks.length;
      renderPack(ideaPacks[currentIndex]);
    });
  </script>
</body>
</html>
